<!DOCTYPE html>
<html>
<head>
    <title>Gym Membership Management System</title>
    <link rel="stylesheet" href="vinodh.css">
</head>
<body>

<header>
    <h1>Gym Membership Management System</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#plans">Plans</a>
        <a href="#booking">Booking</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home">
    <h2>Welcome to Our Gym</h2>
    <p>Manage memberships, trainers, schedules and payments easily.</p>
</section>

<section id="plans">
    <h2>Membership Plans</h2>

    <div class="card">
        <h3>Basic Plan</h3>
        <p>₹999 / Month</p>
    </div>

    <div class="card">
        <h3>Premium Plan</h3>
        <p>₹1999 / Month</p>
    </div>
</section>

<section id="booking">
    <h2>Class Booking</h2>

    <form id="bookingForm">
        <input type="text" id="name" placeholder="Enter Name" required>
        <select id="classType">
            <option>Yoga</option>
            <option>Zumba</option>
            <option>Cardio</option>
            <option>Weight Training</option>
        </select>
        <button type="submit">Book Class</button>
    </form>

    <p id="message"></p>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <p>Email: gym@gmail.com</p>
    <p>Phone: +91 9876543210</p>
</section>

<script src="vinodhh.js"></script>

</body>
</html>
